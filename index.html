<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up Form</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Bungee&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Pliant:ital,wght@0,100..900;1,100..900&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
    </head>

    <body>
        <div class="everything">
            <div class="left-image">
                <div class="green-leaves">
                    <img src="halie-west-25xggax4bSA-unsplash.jpg" alt="green leaves background">
                </div>

                <div class="ODIN">
                    <img src="odin-lined.png" alt="the odin project logo">
                    <h1>ODIN</h1>
                </div>
                <div>
                    Photo by <a
                        href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie
                        West</a> on <a
                        href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
                </div>
            </div>
            <div class="right-side">
                <div>
                    This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.
                </div>
                <div class="form">
                    <form action="/submit-data-url" method="POST">
                        <div class="main-form">
                            <div class="firstrow">
                                <label for="first-name">FIRST NAME</label>
                                <input type="text" id="first-name" name="first-name" required>

                                <label for="last-name">LAST NAME</label>
                                <input type="text" id="last-name" name="last-name" required>
                            </div>
                            
                            <div class="secondrow">
                                <label for="email">EMAIL</label>
                                <input type="email" id="email" name="email" required>

                                <label for="phn-no">PHONE NUMBER</label>
                                <input type="tel" id="phn-no" name="phn-no" required>
                            </div>
                            
                            <div class="thirdrow">
                                <label for="password">PASSWORD</label>
                                <input type="password" id="password" name="password" required>

                                <label for="confirm-password">CONFIRM PASSWORD</label>
                                <input type="password" id="confirm-password" name="confirm-password" required>
                            </div>
                        </div>
                    </form>
                    <button type="submit">Create Account</button>
                    <p>Already have an account? <a>Log in</a></p>
                </div>
            </div>
        </div>
    </body>

</html>
